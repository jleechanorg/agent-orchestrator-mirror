# Gitleaks configuration for Agent Orchestrator
# Prevents accidental commits of secrets, API keys, tokens, etc.

title = "Agent Orchestrator Secret Scanning"

# Use all default gitleaks rules
[extend]
useDefault = true

# Allowlist to ignore false positives
[allowlist]
description = "Allowlisted patterns"

paths = [
  "node_modules/",
  "dist/",
  ".next/",
  "coverage/",
  "pnpm-lock.yaml",
  "agent-orchestrator.yaml",
  "SECURITY.md",
]

regexes = [
  # Environment variable references
  "\\$\\{[A-Z_]+\\}",

  # Placeholder values
  "your-api-key-here",
  "your-token-here",
  "example\\.com",

  # Example tokens in docs (false positives)
  "lin_api_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
  "ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
  "m1af5c4fb9e07dc5e69a20de02bbea65",
]
